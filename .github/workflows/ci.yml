name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      # `go vet` is included via golangci-lint's `govet` linter; the lint job
      # is the source of truth. Keeping `go test` and `go build` here so test
      # failures and build failures stay distinct from lint failures.
      - name: Test
        # `-race` catches data races at test time (vastly cheaper than in
        # production); `-count=1` defeats the test cache, which interacts
        # poorly with -race in CI.
        run: go test -race -count=1 ./...

      - name: Build
        run: go build ./cmd/cert_viewer

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        # Required for golangci-lint to compile Fyne-dependent packages.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      # Build golangci-lint from source with the pinned toolchain rather than
      # downloading the prebuilt binary via golangci-lint-action. The v1.64.8
      # release was built with Go 1.24, which fails with "the Go language
      # version (go1.24) used to build golangci-lint is lower than the
      # targeted Go version" once go.mod targets 1.25+. Using `go install`
      # compiles the linter under our toolchain (1.25.9) so the version-skew
      # check passes; bump in lockstep with CLAUDE.md when upgrading.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

  vuln:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        # Required because govulncheck loads packages with cgo; the Fyne
        # GLFW/GL backend won't build without these headers.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      # govulncheck only flags vulnerabilities in code paths the project
      # actually reaches, so signal stays high. Pinned version keeps results
      # reproducible; bump in lockstep with CLAUDE.md when upgrading.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: govulncheck ./...

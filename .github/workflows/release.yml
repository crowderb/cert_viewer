name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev xorg-dev \
            libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - name: Build
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o cert_viewer-linux-amd64 ./cmd/cert_viewer

      - uses: actions/upload-artifact@v4
        with:
          name: cert_viewer-linux-amd64
          path: cert_viewer-linux-amd64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build
        run: |
          CC=x86_64-w64-mingw32-gcc CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -H windowsgui" -o cert_viewer-windows-amd64.exe ./cmd/cert_viewer

      - uses: actions/upload-artifact@v4
        with:
          name: cert_viewer-windows-amd64.exe
          path: cert_viewer-windows-amd64.exe

  build-darwin-amd64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w" -o cert_viewer-darwin-amd64 ./cmd/cert_viewer

      - uses: actions/upload-artifact@v4
        with:
          name: cert_viewer-darwin-amd64
          path: cert_viewer-darwin-amd64

  build-darwin-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w" -o cert_viewer-darwin-arm64 ./cmd/cert_viewer

      - uses: actions/upload-artifact@v4
        with:
          name: cert_viewer-darwin-arm64
          path: cert_viewer-darwin-arm64

  release:
    needs: [build-linux, build-windows, build-darwin-amd64, build-darwin-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cert_viewer-linux-amd64/cert_viewer-linux-amd64
            cert_viewer-windows-amd64.exe/cert_viewer-windows-amd64.exe
            cert_viewer-darwin-amd64/cert_viewer-darwin-amd64
            cert_viewer-darwin-arm64/cert_viewer-darwin-arm64
